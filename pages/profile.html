<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - VCart</title>
  <meta name="description" content="Manage your VCart account.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="announcement-bar">
    <span>&#x26A1; Free Shipping on orders above &#x20B9;500</span>
    <button class="close-announce" aria-label="Close">&times;</button>
  </div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <div class="hamburger" aria-label="Open menu" role="button" tabindex="0"><span></span><span></span><span></span></div>
      <a href="/index.html" class="navbar-brand" aria-label="Home"><div class="brand-icon">V</div><span class="brand-highlight">V</span>Cart</a>
      <div class="navbar-actions">
        <button class="theme-toggle" aria-label="Dark mode">&#x263E;</button>
        <a href="/pages/cart.html" class="nav-btn" aria-label="Cart">&#x1F6D2;<span class="badge cart-badge" style="display:none;">0</span></a>
        <a href="/pages/login.html" class="login-btn visible">Sign In</a>
        <div class="user-profile-btn" role="button" tabindex="0" onclick="window.location.href='/pages/profile.html'"><div class="user-avatar">U</div><span class="user-name">User</span></div>
      </div>
    </div>
  </nav>

  <aside class="sidebar" role="dialog" aria-label="Menu">
    <div class="sidebar-header"><h3>Menu</h3><button class="sidebar-close">&times;</button></div>
    <nav class="sidebar-nav">
      <a href="/index.html">&#x1F3E0; Home</a><a href="/pages/products.html">&#x1F4E6; Products</a>
      <div class="sidebar-divider"></div>
      <a href="/pages/cart.html">&#x1F6D2; Cart</a><a href="/pages/wishlist.html">&#x2661; Wishlist</a>
      <div class="sidebar-divider"></div>
      <div id="sidebar-auth"></div>
    </nav>
  </aside>

  <main class="profile-page">
    <div class="container">
      <div class="profile-header">
        <div class="profile-avatar">U</div>
        <div class="profile-info">
          <h1 id="profile-username">My Account</h1>
          <p id="profile-email">Manage your profile, orders, and settings</p>
        </div>
        <button id="logout-btn" class="btn btn-secondary" style="margin-left:auto;">Logout</button>
      </div>
      <div class="profile-tabs" role="tablist">
        <button class="tab-btn active" data-tab="orders" role="tab">Order History</button>
        <button class="tab-btn" data-tab="details" role="tab">Account Details</button>
        <button class="tab-btn" data-tab="addresses" role="tab">Addresses</button>
      </div>
      <div class="profile-content" id="profile-content-area"><div class="spinner"></div></div>
    </div>
  </main>

  <button class="scroll-top" aria-label="Scroll to top">&#x2B06;</button>

  <script defer src="/js/config.js"></script>
  <script defer src="/js/utils.js"></script>
  <script defer src="/js/products.js"></script>
  <script defer src="/js/cart.js"></script>
  <script defer src="/js/auth.js"></script>
  <script defer src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.getCurrentUser();
      if (user) {
        document.getElementById('profile-username').textContent = 'Hello, ' + user.username + '!';
        const av = document.querySelector('.profile-avatar');
        if (av) av.textContent = user.username.charAt(0).toUpperCase();
      }
      const lo = document.getElementById('logout-btn');
      if (lo) lo.addEventListener('click', () => Auth.logout());
    });
  </script>
</body>
</html>
