<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - VCart</title>
  <meta name="description" content="View your saved items.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="announcement-bar">
    <span>&#x26A1; Free Shipping on orders above &#x20B9;500</span>
    <button class="close-announce" aria-label="Close">&times;</button>
  </div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <div class="hamburger" aria-label="Open menu" role="button" tabindex="0"><span></span><span></span><span></span></div>
      <a href="/index.html" class="navbar-brand" aria-label="Home"><div class="brand-icon">V</div><span class="brand-highlight">V</span>Cart</a>
      <div class="navbar-actions">
        <button class="theme-toggle" aria-label="Dark mode">&#x263E;</button>
        <a href="/pages/cart.html" class="nav-btn" aria-label="Cart">&#x1F6D2;<span class="badge cart-badge" style="display:none;">0</span></a>
        <a href="/pages/login.html" class="login-btn visible">Sign In</a>
        <div class="user-profile-btn" role="button" tabindex="0" onclick="window.location.href='/pages/profile.html'"><div class="user-avatar">U</div><span class="user-name">User</span></div>
      </div>
    </div>
  </nav>

  <aside class="sidebar" role="dialog" aria-label="Menu">
    <div class="sidebar-header"><h3>Menu</h3><button class="sidebar-close">&times;</button></div>
    <nav class="sidebar-nav">
      <a href="/index.html">&#x1F3E0; Home</a><a href="/pages/products.html">&#x1F4E6; Products</a>
      <div class="sidebar-divider"></div>
      <a href="/pages/cart.html">&#x1F6D2; Cart</a>
      <div class="sidebar-divider"></div>
      <div id="sidebar-auth"></div>
    </nav>
  </aside>

  <main class="cart-page">
    <div class="container">
      <div class="section-header"><div class="left"><h2>My Wishlist</h2></div></div>
      <div id="wishlist-container">
        <div class="cart-empty">
          <div class="empty-icon">&#x2661;</div>
          <h2>Your wishlist is empty</h2>
          <p>Save your favorite items here and shop them later.</p>
          <a href="/pages/products.html" class="btn btn-primary">Browse Products</a>
        </div>
      </div>
    </div>
  </main>

  <button class="scroll-top" aria-label="Scroll to top">&#x2B06;</button>

  <script defer src="/js/config.js"></script>
  <script defer src="/js/utils.js"></script>
  <script defer src="/js/products.js"></script>
  <script defer src="/js/cart.js"></script>
  <script defer src="/js/auth.js"></script>
  <script defer src="/js/main.js"></script>
</body>
</html>
