<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Successful - VCart</title>
  <meta name="description" content="Your order has been placed successfully.">
  <meta name="robots" content="noindex, follow">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="announcement-bar">
    <span>&#x26A1; Free Shipping on orders above &#x20B9;500</span>
    <button class="close-announce" aria-label="Close">&times;</button>
  </div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="/index.html" class="navbar-brand" aria-label="Home"><div class="brand-icon">V</div><span class="brand-highlight">V</span>Cart</a>
      <div class="navbar-actions">
        <button class="theme-toggle" aria-label="Dark mode">&#x263E;</button>
        <a href="/pages/cart.html" class="nav-btn" aria-label="Cart">&#x1F6D2;<span class="badge cart-badge" style="display:none;">0</span></a>
      </div>
    </div>
  </nav>

  <main class="order-success">
    <div class="success-card">
      <div class="success-icon">&#x2713;</div>
      <h1>Order Placed!</h1>
      <p>Thank you for your purchase. Your order has been placed successfully.</p>
      <p class="order-number" id="order-number"></p>
      <p style="font-size:var(--font-sm);color:var(--text-muted);">You will receive an email confirmation shortly.</p>
      <div class="actions">
        <a href="/pages/products.html" class="btn btn-primary btn-lg">Continue Shopping</a>
        <a href="/index.html" class="btn btn-secondary btn-lg">Go Home</a>
      </div>
    </div>
  </main>

  <script defer src="/js/config.js"></script>
  <script defer src="/js/utils.js"></script>
  <script defer src="/js/products.js"></script>
  <script defer src="/js/cart.js"></script>
  <script defer src="/js/auth.js"></script>
  <script defer src="/js/main.js"></script>
</body>
</html>
